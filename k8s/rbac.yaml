apiVersion: v1
kind: ServiceAccount
metadata:
  name: lobster-guard
  namespace: lobster-guard
  labels:
    app.kubernetes.io/name: lobster-guard
---
# 最小权限: 只读 Endpoints（用于 K8s 服务发现）
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lobster-guard-discovery
  namespace: openclaw                    # ← 修改为 OpenClaw 所在 namespace
rules:
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lobster-guard-discovery
  namespace: openclaw                    # ← 同上
subjects:
- kind: ServiceAccount
  name: lobster-guard
  namespace: lobster-guard
roleRef:
  kind: Role
  name: lobster-guard-discovery
  apiGroup: rbac.authorization.k8s.io
