# financial.yaml — 金融行业安全规则模板
# lobster-guard v5.1 内置规则库
rules:
  # === 金融数据泄露 ===
  - name: fin_credit_card
    patterns: ["credit card", "信用卡号", "银行卡号", "card number"]
    action: block
    category: pii
    priority: 100
    message: "检测到信用卡/银行卡信息"
    group: financial_pii

  - name: fin_account_number
    patterns: ["account number", "账户号码", "银行账号", "开户行"]
    action: block
    category: pii
    priority: 95
    message: "检测到银行账户信息"
    group: financial_pii

  - name: fin_swift_code
    patterns: ["SWIFT code", "IBAN", "routing number", "ABA number"]
    action: warn
    category: pii
    priority: 85
    message: "检测到银行路由信息"
    group: financial_pii

  - name: fin_trading_secret
    patterns: ["insider trading", "内幕信息", "未公开信息", "material non-public"]
    action: block
    category: compliance
    priority: 100
    message: "检测到内幕交易相关信息"
    group: financial_compliance

  - name: fin_market_manipulation
    patterns: ["pump and dump", "wash trading", "操纵市场", "对敲交易"]
    action: block
    category: compliance
    priority: 95
    message: "检测到市场操纵相关内容"
    group: financial_compliance

  # === 合规风控 ===
  - name: fin_aml_keywords
    patterns: ["money laundering", "洗钱", "地下钱庄", "hawala"]
    action: block
    category: compliance
    priority: 100
    message: "检测到反洗钱相关敏感词"
    group: financial_compliance

  - name: fin_sanctions
    patterns: ["sanctions evasion", "制裁规避", "OFAC", "SDN list"]
    action: block
    category: compliance
    priority: 100
    message: "检测到制裁相关内容"
    group: financial_compliance

  - name: fin_transfer_amount
    patterns: ["transfer $", "wire transfer", "转账金额", "电汇"]
    action: warn
    category: compliance
    priority: 70
    message: "检测到资金转移指令"
    group: financial_operations

  - name: fin_unauthorized_trading
    patterns: ["execute trade", "buy order", "sell order", "place order", "下单"]
    action: warn
    category: compliance
    priority: 80
    message: "检测到交易指令"
    group: financial_operations

  - name: fin_risk_limit
    patterns: ["override risk limit", "bypass compliance", "跳过风控", "绕过审批"]
    action: block
    category: compliance
    priority: 100
    message: "检测到风控绕过尝试"
    group: financial_compliance

  # === 客户隐私 ===
  - name: fin_customer_id
    patterns: ["customer ID", "client ID", "客户编号", "证件号码"]
    action: warn
    category: pii
    priority: 80
    message: "检测到客户标识信息"
    group: financial_pii

  - name: fin_tax_info
    patterns: ["tax ID", "taxpayer", "纳税人识别号", "税号"]
    action: warn
    category: pii
    priority: 85
    message: "检测到税务信息"
    group: financial_pii

  # === Prompt Injection (金融增强) ===
  - name: fin_injection_transfer
    patterns: ["transfer funds to", "send money to", "approve payment", "authorize withdrawal"]
    action: block
    category: prompt_injection
    priority: 100
    message: "检测到资金操作注入攻击"
    group: prompt_injection

  - name: fin_injection_account
    patterns: ["change account", "modify beneficiary", "update routing", "redirect payment"]
    action: block
    category: prompt_injection
    priority: 95
    message: "检测到账户变更注入攻击"
    group: prompt_injection

  - name: fin_social_engineering
    patterns: ["CEO asked me to", "urgent wire transfer", "confidential acquisition", "紧急转账"]
    action: block
    category: social_engineering
    priority: 95
    message: "检测到金融社工攻击（BEC）"
    group: social_engineering

  - name: fin_audit_bypass
    patterns: ["skip audit", "no audit trail", "off the record", "不留记录"]
    action: block
    category: compliance
    priority: 90
    message: "检测到审计规避尝试"
    group: financial_compliance
