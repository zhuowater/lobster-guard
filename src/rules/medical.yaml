# medical.yaml — 医疗行业安全规则模板
# lobster-guard v5.1 内置规则库
rules:
  # === 患者隐私 (HIPAA/个保法) ===
  - name: med_patient_id
    patterns: ["patient ID", "patient number", "病历号", "就诊卡号", "医保卡号"]
    action: block
    category: pii
    priority: 100
    message: "检测到患者标识信息"
    group: medical_pii

  - name: med_diagnosis
    patterns: ["diagnosed with", "diagnosis:", "诊断结果", "确诊为", "检查报告"]
    action: warn
    category: pii
    priority: 90
    message: "检测到诊断信息"
    group: medical_pii

  - name: med_prescription
    patterns: ["prescribed", "prescription for", "处方", "用药方案", "剂量"]
    action: warn
    category: pii
    priority: 85
    message: "检测到处方信息"
    group: medical_pii

  - name: med_lab_results
    patterns: ["lab results", "test results", "blood test", "化验结果", "检验报告"]
    action: warn
    category: pii
    priority: 85
    message: "检测到检验结果信息"
    group: medical_pii

  - name: med_genetic_data
    patterns: ["genetic test", "DNA analysis", "genome", "基因检测", "染色体"]
    action: block
    category: pii
    priority: 100
    message: "检测到基因数据（高度敏感）"
    group: medical_pii

  - name: med_mental_health
    patterns: ["psychiatric", "mental health record", "精神科", "心理诊断", "抑郁症"]
    action: block
    category: pii
    priority: 100
    message: "检测到精神健康记录"
    group: medical_pii

  - name: med_hiv_status
    patterns: ["HIV status", "HIV positive", "HIV test", "艾滋病检测"]
    action: block
    category: pii
    priority: 100
    message: "检测到 HIV 相关信息（特殊保护）"
    group: medical_pii

  # === 医疗安全 ===
  - name: med_dosage_override
    patterns: ["override dosage", "ignore dosage limit", "超剂量", "跳过用药审核"]
    action: block
    category: safety
    priority: 100
    message: "检测到用药剂量覆盖尝试"
    group: medical_safety

  - name: med_allergy_bypass
    patterns: ["ignore allergy", "bypass allergy check", "忽略过敏", "跳过过敏检查"]
    action: block
    category: safety
    priority: 100
    message: "检测到过敏检查绕过尝试"
    group: medical_safety

  - name: med_unauthorized_access
    patterns: ["access all patients", "view all records", "查看全部病历", "导出患者数据"]
    action: block
    category: compliance
    priority: 95
    message: "检测到未授权批量访问尝试"
    group: medical_compliance

  # === 合规 ===
  - name: med_hipaa_violation
    patterns: ["share patient info", "email medical record", "分享病历", "发送检查报告给"]
    action: warn
    category: compliance
    priority: 90
    message: "检测到可能的隐私合规风险"
    group: medical_compliance

  - name: med_consent_bypass
    patterns: ["without consent", "skip consent", "未经同意", "跳过知情同意"]
    action: block
    category: compliance
    priority: 95
    message: "检测到知情同意绕过尝试"
    group: medical_compliance

  - name: med_record_tampering
    patterns: ["modify diagnosis", "change medical record", "修改病历", "篡改诊断"]
    action: block
    category: compliance
    priority: 100
    message: "检测到病历篡改尝试"
    group: medical_compliance

  # === Prompt Injection (医疗增强) ===
  - name: med_injection_prescribe
    patterns: ["prescribe me", "write prescription for", "给我开处方", "开药"]
    action: block
    category: prompt_injection
    priority: 95
    message: "检测到处方注入攻击"
    group: prompt_injection

  - name: med_injection_diagnosis
    patterns: ["diagnose me with", "confirm diagnosis", "确认诊断为", "替我诊断"]
    action: warn
    category: prompt_injection
    priority: 85
    message: "检测到诊断注入尝试"
    group: prompt_injection

  - name: med_insurance_fraud
    patterns: ["fake diagnosis", "insurance fraud", "虚假诊断", "骗保", "套取医保"]
    action: block
    category: compliance
    priority: 100
    message: "检测到医保欺诈相关内容"
    group: medical_compliance
