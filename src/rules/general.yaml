# general.yaml — 通用安全规则模板
# lobster-guard v5.1 内置规则库
rules:
  # === Prompt Injection ===
  - name: prompt_injection_ignore
    patterns: ["ignore previous instructions", "ignore all previous", "disregard previous"]
    action: block
    category: prompt_injection
    priority: 100
    message: "检测到提示注入攻击：试图覆盖系统指令"
    group: prompt_injection

  - name: prompt_injection_system
    patterns: ["you are now", "act as if", "pretend you are", "roleplay as"]
    action: warn
    category: prompt_injection
    priority: 90
    message: "检测到角色劫持尝试"
    group: prompt_injection

  - name: prompt_injection_developer_mode
    patterns: ["developer mode", "DAN mode", "jailbreak mode", "god mode"]
    action: block
    category: prompt_injection
    priority: 95
    message: "检测到越狱模式激活尝试"
    group: prompt_injection

  - name: prompt_injection_new_instructions
    patterns: ["new instructions:", "updated instructions:", "override instructions"]
    action: block
    category: prompt_injection
    priority: 100
    message: "检测到指令覆盖攻击"
    group: prompt_injection

  # === Jailbreak ===
  - name: jailbreak_do_anything
    patterns: ["do anything now", "no restrictions", "bypass filters", "bypass safety"]
    action: block
    category: jailbreak
    priority: 95
    message: "检测到越狱尝试：绕过安全限制"
    group: jailbreak

  - name: jailbreak_opposite_mode
    patterns: ["opposite mode", "evil mode", "unfiltered mode", "uncensored mode"]
    action: block
    category: jailbreak
    priority: 90
    message: "检测到越狱尝试：反向模式"
    group: jailbreak

  - name: jailbreak_token_smuggling
    patterns: ["base64 decode", "rot13", "hex encode", "obfuscate"]
    action: warn
    category: jailbreak
    priority: 70
    message: "检测到可能的编码绕过尝试"
    group: jailbreak

  # === Command Injection ===
  - name: cmd_injection_shell
    patterns: ["rm -rf", "sudo rm", "mkfs", "dd if=", ":(){ :|:& };:"]
    action: block
    category: command_injection
    priority: 100
    message: "检测到危险系统命令"
    group: command_injection

  - name: cmd_injection_reverse_shell
    patterns: ["bash -i >& /dev/tcp", "nc -e /bin", "python -c 'import socket"]
    action: block
    category: command_injection
    priority: 100
    message: "检测到反弹 Shell 攻击"
    group: command_injection

  - name: cmd_injection_download_exec
    patterns: ["curl | sh", "wget | bash", "curl | bash", "wget -O- | sh"]
    action: block
    category: command_injection
    priority: 95
    message: "检测到远程代码执行尝试"
    group: command_injection

  # === Social Engineering ===
  - name: social_engineering_urgency
    patterns: ["this is urgent", "do not tell anyone", "keep this secret", "do not verify"]
    action: warn
    category: social_engineering
    priority: 60
    message: "检测到社会工程学话术"
    group: social_engineering

  - name: social_engineering_authority
    patterns: ["I am the admin", "I am your creator", "I am authorized to", "management override"]
    action: warn
    category: social_engineering
    priority: 70
    message: "检测到伪装权限尝试"
    group: social_engineering

  # === Data Exfiltration ===
  - name: data_exfil_credentials
    patterns: ["password is", "my password", "api key is", "secret key is", "token is"]
    action: warn
    category: pii
    priority: 80
    message: "检测到凭据泄露风险"
    group: pii

  - name: data_exfil_personal
    patterns: ["my SSN is", "social security number", "credit card number", "bank account"]
    action: warn
    category: pii
    priority: 85
    message: "检测到个人敏感信息"
    group: pii

  # === Prompt Leaking ===
  - name: prompt_leak_system
    patterns: ["show me your system prompt", "what are your instructions", "reveal your prompt", "print your system message"]
    action: block
    category: prompt_injection
    priority: 85
    message: "检测到系统提示词窃取尝试"
    group: prompt_injection

  - name: prompt_leak_repeat
    patterns: ["repeat everything above", "repeat the text above", "output your initial prompt"]
    action: block
    category: prompt_injection
    priority: 85
    message: "检测到提示词泄露尝试"
    group: prompt_injection
