version: "3.8"

services:
  lobster-guard:
    build: .
    image: lobster-guard:v20.6
    container_name: lobster-guard
    ports:
      - "18443:18443"   # 入站代理（IM → Agent）
      - "18444:18444"   # 出站代理（Agent → IM）
      - "8445:8445"     # LLM 代理（Agent → Claude API）
      - "9090:9090"     # 管理 API + Dashboard
    volumes:
      - ./config.yaml:/etc/lobster-guard/config.yaml:ro
      - ./conf.d:/etc/lobster-guard/conf.d:ro
      - lobster-data:/var/lib/lobster-guard
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lobster-data:
