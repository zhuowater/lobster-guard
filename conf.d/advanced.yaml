# ============================================================
# 高级/运维配置
# WebSocket / 备份 / 归档 / 限流 / 告警 / 智能检测 / 会话
# ============================================================

# --- WebSocket 代理（v4.1）---
# ws_mode: "inspect"           # inspect | passthrough
# ws_idle_timeout: 300
# ws_max_duration: 3600
# ws_max_connections: 100

# --- 高可用（v4.2）---
# shutdown_timeout: 30
# backup_dir: "/var/lib/lobster-guard/backups/"
# backup_max_count: 10
# backup_auto_interval: 0     # 自动备份间隔（小时），0 = 不自动

# --- 可观测性（v5.0）---
# log_format: "text"           # "text" | "json"
# audit_archive_enabled: false
# audit_archive_dir: "/var/lib/lobster-guard/archives/"

# --- 审计（v3.10）---
# audit_retention_days: 30

# --- 告警通知（v3.10）---
# alert_webhook: "https://your-webhook-url/api/notify"
# alert_min_interval: 60
# alert_format: "generic"     # "generic" | "lanxin"

# --- 限流（v3.3+）---
# rate_limit:
#   global_rps: 100
#   global_burst: 200
#   per_sender_rps: 5
#   per_sender_burst: 10
#   exempt_senders:
#     - "admin-sender-id"

# --- 智能检测（v5.1）---
# rule_templates: ["general", "financial"]
# detect_pipeline: ["keyword", "regex", "pii", "session"]
# detect_timeout_ms: 50
# session_detect_enabled: false
# session_risk_threshold: 10
# session_window: 20
# session_decay_rate: 1
# detect_cache_ttl: 300
# detect_cache_size: 1000

# --- LLM 检测层（v5.1）---
# llm_detect_enabled: false
# llm_detect_endpoint: "https://api.openai.com/v1/chat/completions"
# llm_detect_api_key: "sk-xxx"
# llm_detect_model: "gpt-4o-mini"
# llm_detect_timeout: 5
# llm_detect_mode: "async"

# --- IM↔LLM 会话关联（v17.3）---
# session_idle_timeout_min: 60
# session_fp_window_sec: 300

# --- 配置安全加固（v18.2）---
# config_encryption_key: "YOUR_CONFIG_ENCRYPTION_KEY_16CH"
# api_token_rotation: false

# --- 后台调度（v18.0）---
# chain_analysis_interval_min: 5
# behavior_scan_interval_min: 10
