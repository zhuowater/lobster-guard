# ============================================================
# LLM 安全域 — 反向代理 + 审计（v9.0+）
# 独立于 IM 侧功能，透明反向代理 LLM API 调用
# ============================================================

llm_proxy:
  enabled: false
  listen: ":8445"
  targets:
    - name: "anthropic"
      upstream: "https://api.anthropic.com"
      path_prefix: "/v1/"
      api_key_header: "x-api-key"
    # - name: "openai"
    #   upstream: "https://api.openai.com"
    #   path_prefix: "/v1/"
    #   api_key_header: "Authorization"
  security:
    scan_pii_in_response: true
    prompt_injection_scan: true
    block_high_risk_tools: false
    high_risk_tool_list:
      - exec
      - shell
      - write_file
      - delete_file
    canary_token:
      enabled: true
      auto_rotate: true
      alert_action: "warn"
    response_budget:
      enabled: true
      max_tool_calls_per_req: 20
      max_single_tool_per_req: 5
      max_tokens_per_req: 100000
      over_budget_action: "warn"
      tool_limits:
        exec: 3
        shell: 2
  audit:
    log_system_prompt: false
    log_tool_input: true
    log_tool_result: true
    max_preview_len: 500
  cost_alert:
    daily_limit_usd: 50
    webhook_url: ""
  timeout_sec: 300
  max_body_bytes: 10485760
  # rules: []              # LLM 规则，见 config.yaml.full-example
