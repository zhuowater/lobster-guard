# ============================================================
# 出站审计规则（v18 智能合并机制）
# 6 条默认规则始终加载，同名规则覆盖，新名称追加
# ============================================================

outbound_rules:
  # PII 泄露
  - name: "pii_id_card"
    pattern: '(?:^|\D)\d{17}[\dXx](?:\D|$)'
    action: "block"
    priority: 100
    message: "消息中包含身份证号，已被安全策略拦截。"

  - name: "pii_bank_card"
    pattern: '(?:^|\D)[3-6]\d{15,18}(?:\D|$)'
    action: "block"
    priority: 100

  # 凭据泄露
  - name: "credential_apikey"
    patterns:
      - 'sk-[a-zA-Z0-9]{20,}'
      - 'ghp_[a-zA-Z0-9]{36}'
      - 'AKIA[0-9A-Z]{16}'
    action: "block"

  - name: "credential_private_key"
    patterns:
      - '-----BEGIN .* PRIVATE KEY-----'
    action: "block"

  # 系统提示词泄露（精确匹配：仅在内容被实际输出时触发，避免文件名操作描述产生误报）
  - name: "system_prompt_leak"
    patterns:
      - '(?i)(my\s+system\s+prompt|以下是.{0,20}(SOUL|AGENTS|MEMORY)\.md|(SOUL|AGENTS|MEMORY)\.md.{0,10}内容如下|我的系统提示词.{0,20}(SOUL|AGENTS|MEMORY)\.md)'
    action: "warn"

  # 恶意命令
  - name: "malicious_command"
    pattern: '(rm\s+-rf\s+/|curl\s+.*\|\s*bash|wget\s+.*\|\s*sh)'
    action: "block"

