name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: src/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev
      - name: Build Dashboard
        working-directory: dashboard
        run: npm ci --ignore-scripts && npm run build
      - name: Copy Dashboard dist to src/
        run: cp -r dashboard/dist src/dashboard/dist
      - name: Build
        working-directory: src
        run: CGO_ENABLED=1 go build -o /dev/null .
      - name: Test
        working-directory: src
        run: CGO_ENABLED=1 go test -count=1 -timeout 180s ./...
      - name: Vet
        working-directory: src
        run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lobster-guard:ci .
