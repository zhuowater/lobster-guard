name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Dashboard
        working-directory: dashboard
        run: npm ci && npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install SQLite dev
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        working-directory: src
        run: go build -o /tmp/lobster-guard .
      
      - name: Test
        working-directory: src
        run: go test ./... -count=1 -timeout 300s -v 2>&1 | tail -50
      
      - name: Test Summary
        if: always()
        working-directory: src
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          go test ./... -count=1 -timeout 300s 2>&1 | grep -E "^ok|^FAIL|^---" >> $GITHUB_STEP_SUMMARY || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: dashboard
        run: npm ci
      
      - name: Build Dashboard
        working-directory: dashboard
        run: npm run build
      
      - name: Check dist size
        working-directory: dashboard
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "Dashboard dist size: $SIZE"
          echo "## Dashboard Build" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $SIZE" >> $GITHUB_STEP_SUMMARY
