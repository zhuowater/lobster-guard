name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev
      - name: Build
        working-directory: src
        run: CGO_ENABLED=1 go build -o /dev/null .
      - name: Test
        working-directory: src
        run: CGO_ENABLED=1 go test -count=1 -timeout 120s ./...
      - name: Vet
        working-directory: src
        run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lobster-guard:ci .
